name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ./RetailSphere.sln

      - name: Build
        run: dotnet build ./RetailSphere.sln --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test ./tests/RetailSphere.UnitTests/RetailSphere.UnitTests.csproj --configuration Release --no-build --logger "trx;LogFileName=unit-tests.trx"

      - name: Integration tests
        run: dotnet test ./tests/RetailSphere.IntegrationTests/RetailSphere.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
