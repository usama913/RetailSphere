services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: retailsphere
      MYSQL_USER: retailsphere
      MYSQL_PASSWORD: changeme
      MYSQL_ROOT_PASSWORD: changeme_root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pchangeme_root"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MySql: "Server=mysql;Port=3306;Database=retailsphere;User=retailsphere;Password=changeme;TreatTinyAsBoolean=true;"
      ConnectionStrings__Redis: "redis:6379"
      Cors__AllowedOrigins__0: "http://localhost:8081"
    ports:
      - "8080:8080"

  ui:
    build:
      context: .
      dockerfile: ui/RetailSphere.UI/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  mysql_data:
